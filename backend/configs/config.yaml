# MaaS-Router 配置文件
# 复制此文件为 config.yaml 并根据实际情况修改

server:
  addr: ":8080"
  mode: "normal"  # simple 或 normal
  h2c: true
  shutdown_timeout: "30s"

database:
  host: "localhost"
  port: 5432
  user: "maas_user"
  password: "maas_password"
  database: "maas_router"
  sslmode: "disable"
  # 连接池配置
  max_open_conns: 100          # 最大打开连接数
  max_idle_conns: 10           # 最大空闲连接数
  conn_max_lifetime: "1h"      # 连接最大存活时间
  conn_max_idle_time: "10m"    # 连接最大空闲时间
  conn_timeout: "10s"          # 连接超时时间
  enable_warmup: true          # 是否启用连接池预热
  warmup_conns: 5              # 预热连接数

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  # 连接池配置
  pool_size: 100               # 连接池大小
  min_idle_conns: 10           # 最小空闲连接数
  conn_timeout: "5s"           # 连接超时时间
  read_timeout: "3s"           # 读取超时时间
  write_timeout: "3s"          # 写入超时时间
  max_retries: 3               # 最大重试次数
  retry_backoff: "100ms"       # 重试间隔

jwt:
  secret: "your-super-secret-jwt-key-change-this-in-production"
  access_token_expire: "24h"
  refresh_token_expire: "168h"
  issuer: "maas-router"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Authorization"
    - "Content-Type"
    - "X-Request-ID"
    - "X-API-Key"
  allow_credentials: true
  max_age: "12h"

gateway:
  max_request_body_size: 10485760  # 10MB
  request_timeout: "120s"
  upstream_timeout: "300s"
  enable_compression: true
  # HTTP 连接池配置
  http_pool:
    max_idle_conns: 100              # 最大空闲连接数
    max_idle_conns_per_host: 10      # 每个主机的最大空闲连接数
    idle_conn_timeout: "90s"         # 空闲连接超时时间
    tls_handshake_timeout: "10s"     # TLS 握手超时时间
    disable_keep_alives: false       # 是否禁用 Keep-Alive
    disable_compression: false       # 是否禁用压缩
    response_header_timeout: "30s"   # 响应头超时时间
    expect_continue_timeout: "1s"    # 期望 100-Continue 超时时间
    max_retries: 3                   # 最大重试次数
    retry_interval: "100ms"          # 重试间隔

log:
  level: "info"  # debug, info, warn, error
  file_path: "logs/maas-router.log"
  max_size: 100  # MB
  max_backups: 10
  max_age: 30  # days
  compress: true
  json_format: false

judge_agent:
  url: "http://localhost:8000"
  timeout: "100ms"
  max_retries: 3
  pool_size: 10

billing:
  settlement_hour: 0  # UTC 0:00
  min_balance: 1.0
  cred_contract_address: "0x..."
  chain_id: 137  # Polygon

# 监控配置
metrics:
  enabled: true
  addr: ":9090"           # 指标服务器地址
  path: "/metrics"        # 指标路径
