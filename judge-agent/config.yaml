# MaaS-Router Judge Agent Configuration

app:
  name: "maas-router-judge-agent"
  version: "1.0.0"
  debug: false
  host: "0.0.0.0"
  port: 8000

# Judge Agent Configuration
judge:
  # Model configuration for complexity scoring
  model:
    name: "Qwen2.5-7B-Instruct"
    # API endpoint for the model (can be local or remote)
    api_url: "${JUDGE_MODEL_API_URL:http://localhost:8001/v1/chat/completions}"
    api_key: "${JUDGE_MODEL_API_KEY:}"
    # Timeout for model inference (seconds)
    timeout: 30
    # Maximum tokens for the response
    max_tokens: 256
    temperature: 0.1  # Low temperature for consistent scoring

  # Scoring configuration
  scoring:
    # Score range
    min_score: 1
    max_score: 10
    # Complexity thresholds
    thresholds:
      simple: { min: 1, max: 3, description: "简单问答、格式化任务" }
      normal: { min: 4, max: 6, description: "常规对话、翻译、摘要" }
      complex: { min: 7, max: 8, description: "复杂推理、代码生成" }
      advanced: { min: 9, max: 10, description: "高级创作、深度分析" }

  # Prompt templates
  prompts:
    system_prompt: |
      你是一个专业的任务复杂度评估专家。你的任务是对用户输入的查询进行复杂度评分。

      评分标准（1-10分）：
      - 1-3分：简单问答、格式化任务（如：问候、简单事实查询、格式转换）
      - 4-6分：常规对话、翻译、摘要（如：一般性对话、文本翻译、内容摘要）
      - 7-8分：复杂推理、代码生成（如：数学推理、编程任务、逻辑分析）
      - 9-10分：高级创作、深度分析（如：创意写作、深度研究报告、复杂系统设计）

      你只需要输出一个1-10之间的整数分数，不要有任何其他解释。

    user_prompt_template: |
      请评估以下查询的复杂度：

      查询内容："""{query}"""

      请只输出一个1-10之间的整数分数：

# Router Configuration (for reference)
router:
  # Model tiers based on complexity scores
  tiers:
    - name: "lightweight"
      models: ["qwen2.5-1.5b", "llama3.2-1b"]
      score_range: [1, 3]
      description: "轻量级模型，适用于简单任务"

    - name: "standard"
      models: ["qwen2.5-7b", "llama3.1-8b"]
      score_range: [4, 6]
      description: "标准模型，适用于一般任务"

    - name: "advanced"
      models: ["qwen2.5-14b", "llama3.1-70b"]
      score_range: [7, 8]
      description: "高级模型，适用于复杂任务"

    - name: "premium"
      models: ["qwen2.5-72b", "gpt-4o"]
      score_range: [9, 10]
      description: "顶级模型，适用于高难度任务"

# Logging
logging:
  level: "INFO"
  format: "json"

# Metrics
metrics:
  enabled: true
  prometheus_port: 9090
