# Nginx reverse proxy for MaaS-Router
# Load balances between API server replicas

upstream api_servers {
    least_conn;
    server api-server-1:8001 weight=1;
    server api-server-2:8001 weight=1;
}

upstream admin_servers {
    least_conn;
    server admin-server-1:8005 weight=1;
    server admin-server-2:8005 weight=1;
}

server {
    listen 80;
    server_name _;

    # Rate limiting zone (10 req/s per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # API Server (user-facing)
    location /v1/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket/SSE support for streaming
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Admin Server
    location /api/admin/ {
        proxy_pass http://admin_servers;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks
    location /health {
        proxy_pass http://api_servers/health;
    }

    # Admin Platform (static)
    location / {
        proxy_pass http://admin-platform:5173;
        proxy_set_header Host $host;
    }
}
