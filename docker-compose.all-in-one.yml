# MaaS-Router All-in-One Docker Compose 配置
# 单容器部署，适合快速体验和本地开发
# 使用方式: docker-compose -f docker-compose.all-in-one.yml up -d

version: '3.8'

services:
  maas-router:
    # 镜像名称
    image: maas-router:latest
    
    # 构建配置
    build:
      context: .
      dockerfile: Dockerfile.all-in-one
    
    # 容器名称
    container_name: maas-router
    
    # 主机名
    hostname: maas-router
    
    # 端口映射
    ports:
      # 用户前端
      - "3000:3000"
      # 管理后台
      - "3001:3001"
      # 后端 API
      - "8080:8080"
      # PostgreSQL (可选，用于外部连接)
      - "5432:5432"
      # Redis (可选，用于外部连接)
      - "6379:6379"
    
    # 环境变量
    environment:
      # 时区设置
      - TZ=Asia/Shanghai
      
      # 数据库配置
      - DATABASE_URL=postgres://maas:maas_password@localhost:5432/maas_router?sslmode=disable
      - POSTGRES_USER=maas
      - POSTGRES_PASSWORD=maas_password
      - POSTGRES_DB=maas_router
      
      # Redis 配置
      - REDIS_URL=redis://localhost:6379
      
      # 后端配置
      - SERVER_PORT=8080
      - SERVER_MODE=release
      
      # JWT 密钥 (生产环境请修改)
      - JWT_SECRET=your-jwt-secret-key-change-in-production
      
      # 支付配置 (可选)
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - ALIPAY_APP_ID=${ALIPAY_APP_ID:-}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY:-}
      - WECHAT_APP_ID=${WECHAT_APP_ID:-}
      - WECHAT_MCH_ID=${WECHAT_MCH_ID:-}
      - WECHAT_API_KEY=${WECHAT_API_KEY:-}
    
    # 数据卷挂载
    volumes:
      # PostgreSQL 数据持久化
      - postgres_data:/var/lib/postgresql/data
      # Redis 数据持久化
      - redis_data:/var/lib/redis
      # 日志持久化
      - logs:/var/log/supervisor
      # 配置文件 (可选)
      - ./configs:/app/configs:ro
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # 重启策略
    restart: unless-stopped
    
    # 网络配置
    networks:
      - maas-network

# 数据卷定义
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local

# 网络定义
networks:
  maas-network:
    driver: bridge
