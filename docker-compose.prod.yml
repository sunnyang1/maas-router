# ============================================================
# MaaS-Router Production Override
# 用法: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 与 docker-compose.yml 的区别:
#   - 使用预构建的镜像（从 Registry 拉取，而不是本地构建）
#   - 生产级资源配置（CPU/内存限制）
#   - 自动重启策略
#   - 日志轮转配置
#   - 安全强化（通过环境变量注入密钥）
#   - 健康检查增强
# ============================================================

version: "3.9"

services:
  # ============================================
  # PostgreSQL - 生产配置
  # ============================================
  postgres:
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-maas_router}
      POSTGRES_USER: ${DB_USER:-maas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required for production}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    # 生产环境不暴露数据库端口到宿主机
    ports: !reset []

  # ============================================
  # Redis - 生产配置
  # ============================================
  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    # 生产环境不暴露 Redis 端口到宿主机
    ports: !reset []

  # ============================================
  # API Server - 生产配置
  # ============================================
  api-server:
    # 生产环境使用 Registry 预构建镜像
    image: ${REGISTRY:-ghcr.io}/${REPO:-your-org/maas-router}/backend:${VERSION_TAG:-latest}
    build: !reset null
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-maas}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-maas_router}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SERVICE_NAME: api-server
      SERVICE_PORT: "8001"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required for production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      API_KEY_PREFIX: ${API_KEY_PREFIX:-sk-mr-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # 移除 dev 模式的 volume mount 和 --reload
    volumes: !reset []
    command: !reset null

  # ============================================
  # Admin Server - 生产配置
  # ============================================
  admin-server:
    image: ${REGISTRY:-ghcr.io}/${REPO:-your-org/maas-router}/backend:${VERSION_TAG:-latest}
    build: !reset null
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-maas}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-maas_router}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SERVICE_NAME: admin-server
      SERVICE_PORT: "8005"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required for production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8005/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    volumes: !reset []
    command: !reset null

  # ============================================
  # Admin Platform - 生产配置
  # ============================================
  admin-platform:
    image: ${REGISTRY:-ghcr.io}/${REPO:-your-org/maas-router}/frontend:${VERSION_TAG:-latest}
    build: !reset null
    restart: always
    environment:
      VITE_API_BASE_URL: ${ADMIN_API_URL:-http://admin-server:8005/api/admin/v1}
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    volumes: !reset []
    command: !reset null

  # ============================================
  # Nginx - 反向代理（如部署到单机）
  # ============================================
  # 如果需要使用 Nginx 反向代理，取消下面注释：
  #
  # nginx:
  #   image: nginx:1.27-alpine
  #   container_name: maas-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
