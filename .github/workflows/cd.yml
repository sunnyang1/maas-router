# ============================================================
# MaaS-Router CD Pipeline (持续部署)
# 触发条件: push to main → 自动部署 Staging
#          workflow_dispatch → 手动部署 Production
# 镜像: backend, judge-agent, user-frontend, admin-frontend
# Registry: GitHub Container Registry (ghcr.io)
# ============================================================

name: CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        type: choice
        options:
          - staging
          - production
        default: 'staging'
      skip_ci:
        description: 'Skip CI checks (NOT recommended)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # Stage 0: CI 质量门
  # ============================================
  ci-check:
    name: "🔍 CI Quality Gate"
    if: ${{ !inputs.skip_ci }}
    uses: ./.github/workflows/ci.yml

  # ============================================
  # Stage 1: 构建 & 推送 Docker 镜像
  # ============================================
  build-and-push:
    name: "📦 Build & Push Images"
    runs-on: ubuntu-latest
    needs: ci-check
    if: ${{ !cancelled() && (needs.ci-check.result == 'success' || needs.ci-check.result == 'skipped') }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          VERSION=$(date +'%Y%m%d')-${GITHUB_SHA::7}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # --- Backend (Go) ---
      - name: Build & push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ steps.meta.outputs.branch }}
            ${{ env.REGISTRY }}/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Judge Agent (Python) ---
      - name: Build & push Judge Agent
        uses: docker/build-push-action@v6
        with:
          context: ./judge-agent
          file: ./judge-agent/Dockerfile
          push: true
          target: production
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/judge-agent:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/judge-agent:${{ steps.meta.outputs.branch }}
            ${{ env.REGISTRY }}/${{ github.repository }}/judge-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- User Frontend (Next.js) ---
      - name: Build & push User Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./user-frontend
          file: ./user-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/user-frontend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/user-frontend:${{ steps.meta.outputs.branch }}
            ${{ env.REGISTRY }}/${{ github.repository }}/user-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Admin Frontend (UmiJS) ---
      - name: Build & push Admin Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./admin-frontend
          file: ./admin-frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/admin-frontend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ github.repository }}/admin-frontend:${{ steps.meta.outputs.branch }}
            ${{ env.REGISTRY }}/${{ github.repository }}/admin-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload deploy config
        uses: actions/upload-artifact@v4
        with:
          name: deploy-config
          path: |
            docker-compose.yml
            docker-compose.prod.yml
            scripts/
            infra/db/migrations/

  # ============================================
  # Stage 2: 部署到 Staging（自动）
  # ============================================
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL || 'https://staging.maas-router.example.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download deploy config
        uses: actions/download-artifact@v4
        with:
          name: deploy-config

      - name: Deploy to Staging
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/maas-router

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose pull backend judge-agent user-frontend admin-frontend

            # Run database migrations (Go Ent auto-migrate on startup, or use SQL migrations)
            if [ -d "infra/db/migrations" ]; then
              docker compose exec -T postgres \
                psql -U ${{ vars.DB_USER || 'maas_user' }} -d ${{ vars.DB_NAME || 'maas_router' }} \
                -f /dev/stdin < infra/db/migrations/002_complexity_fields.sql 2>/dev/null || true
            fi

            # Rolling update
            docker compose up -d --remove-orphans backend judge-agent user-frontend admin-frontend

            # Clean up
            docker image prune -af --filter "until=72h"

            echo "✅ Staging deployment completed"

      - name: Health Check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.STAGING_URL }}/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API Server healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ Waiting... attempt $i/30 (HTTP $STATUS)"
            sleep 2
          done
          echo "❌ Health check failed"
          exit 1

  # ============================================
  # Stage 3: 部署到 Production（手动审批）
  # ============================================
  deploy-production:
    name: "🚀 Deploy to Production"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AUTO_DEPLOY_PROD == 'true')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://api.maas-router.example.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download deploy config
        uses: actions/download-artifact@v4
        with:
          name: deploy-config

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/maas-router

            # Save current state for rollback
            docker compose images -q > /tmp/previous_images.txt

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Database backup
            docker compose exec -T postgres \
              pg_dump -U ${{ vars.DB_USER || 'maas' }} ${{ vars.DB_NAME || 'maas_router' }} > /tmp/pre_deploy_backup.sql

            # Pull & deploy
            docker compose pull backend judge-agent user-frontend admin-frontend
            docker compose up -d --remove-orphans backend judge-agent user-frontend admin-frontend

            # Clean up (keep 7 days)
            docker image prune -af --filter "until=168h"

            echo "✅ Production deployment completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Production Health Check
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.PRODUCTION_URL }}/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Production healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "⏳ Waiting... attempt $i/30 (HTTP $STATUS)"
            sleep 3
          done
          echo "❌ Production health check FAILED!"
          exit 1

      - name: Notify Deployment
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *MaaS-Router Production Deploy* - ${{ job.status }}",
              "blocks": [
                {"type": "section", "text": {"type": "mrkdwn", "text": "*${{ job.status == 'success' && '✅ Production deployment successful!' || '❌ Production deployment FAILED!'}}*"}},
                {"type": "section", "fields": [
                  {"type": "mrkdwn", "text": "*Commit:* `${{ github.sha::7 }}`"},
                  {"type": "mrkdwn", "text": "*Branch:* ${{ github.ref_name }}"},
                  {"type": "mrkdwn", "text": "*Author:* ${{ github.actor }}"},
                  {"type": "mrkdwn", "text": "*Image Tag:* `${{ needs.build-and-push.outputs.image_tag }}`"}
                ]}
              ]
            }

  # ============================================
  # Stage 4: 回滚
  # ============================================
  rollback:
    name: "⏪ Rollback"
    runs-on: ubuntu-latest
    needs: deploy-production
    if: ${{ failure() }}
    environment:
      name: production
    steps:
      - name: Rollback on Server
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/maas-router
            echo "⏪ Rolling back..."

            # Restore database backup
            if [ -f /tmp/pre_deploy_backup.sql ]; then
              docker compose exec -T postgres \
                psql -U ${{ vars.DB_USER || 'maas' }} -d ${{ vars.DB_NAME || 'maas_router' }} < /tmp/pre_deploy_backup.sql
              echo "✅ Database restored"
            fi

            # Restart with previous images
            docker compose restart
            sleep 10
            curl -sf http://localhost:8080/health && echo "✅ Rollback healthy" || echo "❌ Rollback health check failed"

      - name: Notify Rollback
        if: always()
        uses: slackapi/slack-github-action@v2.0.0
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {"text": "⏪ *MaaS-Router Rollback Executed* - Production deployment failed, rolled back to previous version."}
